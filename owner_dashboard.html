<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>NIJA Owner Dashboard</title>
  <style>
    /* ===================== RESET & VARIABLES ===================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d0f14;
      --card:        #161b26;
      --card2:       #1e2535;
      --border:      #2a3347;
      --text:        #e2e8f4;
      --muted:       #8896b3;
      --green:       #22c55e;
      --yellow:      #eab308;
      --orange:      #f97316;
      --red:         #ef4444;
      --blue:        #3b82f6;
      --purple:      #a855f7;
      --accent:      #3b82f6;
      --radius:      12px;
      --radius-sm:   8px;
      --font:        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* ===================== HEADER ===================== */
    .header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-title { font-size: 18px; font-weight: 700; letter-spacing: .5px; }
    .header-title span { color: var(--accent); }
    .header-time { font-size: 12px; color: var(--muted); }

    /* ===================== SECTION WRAPPER ===================== */
    .section { padding: 12px 16px 0; }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* ===================== CARDS ===================== */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .card-row:last-child { border-bottom: none; }
    .card-row-label { color: var(--muted); font-size: 13px; }
    .card-row-value { font-weight: 600; font-size: 14px; }

    .val-green   { color: var(--green); }
    .val-yellow  { color: var(--yellow); }
    .val-orange  { color: var(--orange); }
    .val-red     { color: var(--red); }
    .val-muted   { color: var(--muted); }
    .val-blue    { color: var(--blue); }

    /* ===================== STATUS BADGE ===================== */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge-green  { background: rgba(34,197,94,.15); color: var(--green); }
    .badge-red    { background: rgba(239,68,68,.15);  color: var(--red); }
    .badge-yellow { background: rgba(234,179,8,.15);  color: var(--yellow); }
    .badge-orange { background: rgba(249,115,22,.15); color: var(--orange); }

    /* ===================== CONTROL BUTTONS ===================== */
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }
    .btn {
      padding: 14px 10px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      line-height: 1.3;
      text-align: center;
    }
    .btn:active { opacity: .75; }
    .btn-emoji  { font-size: 22px; }
    .btn-danger { background: rgba(239,68,68,.18); color: var(--red); border: 1px solid rgba(239,68,68,.4); }
    .btn-success{ background: rgba(34,197,94,.18); color: var(--green); border: 1px solid rgba(34,197,94,.4); }
    .btn-warn   { background: rgba(234,179,8,.18); color: var(--yellow); border: 1px solid rgba(234,179,8,.4); }
    .btn-info   { background: rgba(59,130,246,.18); color: var(--blue); border: 1px solid rgba(59,130,246,.4); }

    /* ===================== PIN MODAL ===================== */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 500;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 24px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%;
      max-width: 480px;
      padding: 24px 20px 12px;
    }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; text-align: center; }
    .modal-desc  { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 18px; }
    .pin-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 22px;
      letter-spacing: 8px;
      padding: 14px;
      text-align: center;
      margin-bottom: 16px;
      outline: none;
    }
    .pin-input:focus { border-color: var(--accent); }
    .modal-btn-row { display: flex; gap: 10px; }
    .modal-btn-row .btn { flex: 1; }
    .modal-confirm { background: var(--accent); color: #fff; border: none; padding: 14px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; flex: 1; cursor: pointer; }
    .modal-cancel  { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 14px; border-radius: var(--radius-sm); font-size: 15px; cursor: pointer; }

    /* ===================== ALERTS LIST ===================== */
    .alert-item {
      background: var(--card2);
      border-left: 3px solid var(--border);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .alert-salary  { border-left-color: var(--green); }
    .alert-emergency { border-left-color: var(--red); }
    .alert-big_profit_day { border-left-color: var(--yellow); }
    .alert-msg  { margin-bottom: 3px; }
    .alert-time { color: var(--muted); font-size: 11px; }

    /* ===================== LEDGER TABLE ===================== */
    .ledger-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .ledger-table th {
      text-align: left;
      padding: 6px 8px;
      color: var(--muted);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    .ledger-table td {
      padding: 7px 8px;
      border-bottom: 1px solid rgba(42,51,71,.5);
      vertical-align: top;
    }
    .ledger-table tr:last-child td { border-bottom: none; }
    .amount-in  { color: var(--green); }
    .amount-out { color: var(--red); }
    .recon-ok   { color: var(--green); font-weight: 700; }
    .recon-err  { color: var(--red);   font-weight: 700; }

    /* ===================== TOAST ===================== */
    #toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 20px;
      font-size: 14px;
      z-index: 600;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ===================== BOTTOM NAV ===================== */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 200;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 10px 4px 8px;
      font-size: 10px;
      color: var(--muted);
      cursor: pointer;
      transition: color .15s;
      background: none;
      border: none;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-icon { font-size: 20px; }

    /* ===================== TABS ===================== */
    .tab { display: none; }
    .tab.active { display: block; }

    /* ===================== SPINNER ===================== */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===================== RECONCILE STATUS ===================== */
    .recon-banner {
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .recon-banner.ok  { background: rgba(34,197,94,.12);  color: var(--green); border: 1px solid rgba(34,197,94,.3); }
    .recon-banner.err { background: rgba(239,68,68,.12);  color: var(--red);   border: 1px solid rgba(239,68,68,.3); }

  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">🤖 <span>NIJA</span> Owner</div>
  <div class="header-time" id="headerTime">--:--</div>
</div>

<!-- TAB: STATUS -->
<div class="tab active" id="tab-status">

  <div class="section" style="padding-top:14px">
    <div class="section-label">System Status</div>
    <div class="card" id="systemStatusCard">
      <div class="spinner"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Accounting Summary</div>
    <div class="card" id="accountingCard">
      <div class="spinner"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Salary Engine</div>
    <div class="card" id="salaryCard">
      <div class="spinner"></div>
    </div>
  </div>

</div>

<!-- TAB: CONTROLS -->
<div class="tab" id="tab-controls">

  <div class="section" style="padding-top:14px">
    <div class="section-label">Emergency</div>
    <div class="btn-grid">
      <button class="btn btn-danger" onclick="doAction('emergency_stop')">
        <span class="btn-emoji">🚨</span>Emergency Stop
      </button>
      <button class="btn btn-success" onclick="doAction('clear_emergency_stop')">
        <span class="btn-emoji">✅</span>Clear Stop
      </button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Trading</div>
    <div class="btn-grid">
      <button class="btn btn-warn" onclick="doAction('pause_trading')">
        <span class="btn-emoji">⏸️</span>Pause Trading
      </button>
      <button class="btn btn-success" onclick="doAction('resume_trading')">
        <span class="btn-emoji">▶️</span>Resume Trading
      </button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Salary</div>
    <div class="btn-grid">
      <button class="btn btn-warn" onclick="doAction('disable_salary')">
        <span class="btn-emoji">🔇</span>Disable Salary
      </button>
      <button class="btn btn-success" onclick="doAction('enable_salary')">
        <span class="btn-emoji">💵</span>Enable Salary
      </button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Audit Log</div>
    <div class="card" id="auditCard">
      <div class="spinner"></div>
    </div>
  </div>

</div>

<!-- TAB: ALERTS -->
<div class="tab" id="tab-alerts">

  <div class="section" style="padding-top:14px">
    <div class="section-label">Recent Text Alerts</div>
    <div id="alertsList"></div>
  </div>

</div>

<!-- TAB: LEDGER -->
<div class="tab" id="tab-ledger">

  <div class="section" style="padding-top:14px">
    <div class="section-label">Reconciliation</div>
    <div id="reconBanner"></div>
  </div>

  <div class="section">
    <div class="section-label">Ledger Entries (last 50)</div>
    <div class="card" style="overflow-x:auto; padding:0;">
      <table class="ledger-table" id="ledgerTable">
        <thead>
          <tr>
            <th>Type</th>
            <th>+In</th>
            <th>−Out</th>
            <th>Balance</th>
            <th>Note</th>
          </tr>
        </thead>
        <tbody id="ledgerBody">
          <tr><td colspan="5" style="text-align:center;padding:20px;">
            <div class="spinner"></div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-status"   onclick="switchTab('status')">
    <span class="nav-icon">📊</span>Status
  </button>
  <button class="nav-btn"        id="nav-controls" onclick="switchTab('controls')">
    <span class="nav-icon">🔑</span>Controls
  </button>
  <button class="nav-btn"        id="nav-alerts"   onclick="switchTab('alerts')">
    <span class="nav-icon">📣</span>Alerts
  </button>
  <button class="nav-btn"        id="nav-ledger"   onclick="switchTab('ledger')">
    <span class="nav-icon">📒</span>Ledger
  </button>
</div>

<!-- PIN MODAL -->
<div class="modal-backdrop" id="pinModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Confirm Action</div>
    <div class="modal-desc"  id="modalDesc">Enter your owner PIN to proceed.</div>
    <input
      class="pin-input"
      type="password"
      inputmode="numeric"
      maxlength="8"
      placeholder="••••"
      id="pinInput"
      autocomplete="off"
    />
    <div class="modal-btn-row">
      <button class="modal-cancel"  onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmAction()">Confirm</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// =====================================================================
// CONFIG
// =====================================================================
const API_BASE = window.location.origin;
const REFRESH_MS = 10000; // auto-refresh every 10 s

// =====================================================================
// STATE
// =====================================================================
let currentAction = null;

// =====================================================================
// CLOCK
// =====================================================================
function updateClock() {
  const now = new Date();
  document.getElementById('headerTime').textContent =
    now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// =====================================================================
// TAB SWITCHING
// =====================================================================
function switchTab(name) {
  ['status','controls','alerts','ledger'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
    document.getElementById('nav-' + t).classList.toggle('active', t === name);
  });
  if (name === 'status')   loadStatus();
  if (name === 'controls') loadStatus();
  if (name === 'alerts')   loadAlerts();
  if (name === 'ledger')   loadLedger();
}

// =====================================================================
// TOAST
// =====================================================================
let _toastTimer = null;
function showToast(msg, durationMs = 2800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), durationMs);
}

// =====================================================================
// HELPERS
// =====================================================================
function fmt(v) {
  if (v === null || v === undefined) return '—';
  if (typeof v === 'number') return '$' + v.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  return v;
}

function badge(text, cls) {
  return `<span class="badge badge-${cls}">${text}</span>`;
}

function row(label, valueHtml) {
  return `<div class="card-row">
    <span class="card-row-label">${label}</span>
    <span class="card-row-value">${valueHtml}</span>
  </div>`;
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60)  return Math.round(diff) + 's ago';
  if (diff < 3600) return Math.round(diff/60) + 'm ago';
  if (diff < 86400) return Math.round(diff/3600) + 'h ago';
  return Math.round(diff/86400) + 'd ago';
}

// =====================================================================
// STATUS
// =====================================================================
async function loadStatus() {
  try {
    const res = await fetch(`${API_BASE}/api/owner/status`);
    const data = await res.json();
    renderSystemStatus(data);
    renderAccounting(data.accounting || {});
    renderSalary(data.salary || {});
    renderAudit();
  } catch(e) {
    document.getElementById('systemStatusCard').innerHTML =
      `<div style="color:var(--red);font-size:13px;">⚠️ Could not reach API: ${e.message}</div>`;
  }
}

function renderSystemStatus(data) {
  const oc = data.owner_control || {};
  const ecp = data.emergency_protection || {};
  const ecpLevel = ecp.level || 'UNKNOWN';
  const ecpColors = { NORMAL:'green', CAUTION:'yellow', WARNING:'orange', DANGER:'red', EMERGENCY:'red' };
  const ecpColor = ecpColors[ecpLevel] || 'muted';

  let html = '';
  html += row('Emergency Stop',
    oc.emergency_stop_active
      ? badge('🚨 ACTIVE', 'red')
      : badge('✅ Clear', 'green'));
  html += row('Trading',
    oc.trading_paused
      ? badge('⏸ Paused', 'yellow')
      : badge('▶ Running', 'green'));
  html += row('Salary',
    oc.salary_disabled
      ? badge('❌ Disabled', 'red')
      : badge('✅ Enabled', 'green'));
  html += row('Capital Protection',
    `<span class="val-${ecpColor}">${ecpLevel}</span>`);

  document.getElementById('systemStatusCard').innerHTML = html;
}

function renderAccounting(a) {
  if (a.error) {
    document.getElementById('accountingCard').innerHTML =
      `<div class="val-muted">${a.error}</div>`;
    return;
  }
  let html = '';
  html += row('Balance',   `<span class="val-blue">${fmt(a.balance_usd)}</span>`);
  html += row('Net P&L',   `<span class="${(a.net_pnl_usd||0) >= 0 ? 'val-green' : 'val-red'}">${fmt(a.net_pnl_usd)}</span>`);
  html += row('Profits In',`<span class="val-green">${fmt(a.total_profit_usd)}</span>`);
  html += row('Losses Out',`<span class="val-red">${fmt(a.total_loss_usd)}</span>`);
  html += row('Salary Paid',`<span>${fmt(a.salary_paid_total_usd)}</span>`);
  html += row('Withdrawn',  `<span>${fmt(a.daily_withdrawn_total_usd)}</span>`);
  html += row('Entries',    `<span>${a.total_entries || 0}</span>`);
  document.getElementById('accountingCard').innerHTML = html;
}

function renderSalary(s) {
  if (s.error) {
    document.getElementById('salaryCard').innerHTML =
      `<div class="val-muted">${s.error}</div>`;
    return;
  }
  let html = '';
  html += row('Status',      s.enabled ? badge('✅ Active','green') : badge('❌ Off','red'));
  html += row('Pool Balance',`<span class="val-blue">${fmt(s.pool_usd)}</span>`);
  html += row('Week Profit', `<span class="val-green">${fmt(s.weekly_profit_usd)}</span>`);
  html += row('Weekly Target',`<span>${fmt(s.weekly_target_usd)}</span>`);
  html += row('Total Paid',  `<span>${fmt(s.total_salary_paid_usd)}</span>`);
  document.getElementById('salaryCard').innerHTML = html;
}

// =====================================================================
// AUDIT (shown in Controls tab)
// =====================================================================
async function renderAudit() {
  try {
    const res = await fetch(`${API_BASE}/api/owner/status`);
    const data = await res.json();
    const owner = data.owner_control || {};
    // audit is embedded via get_recent_audit endpoint — reuse status for now
    // We display a minimal "last action" notice
    document.getElementById('auditCard').innerHTML =
      `<div class="val-muted" style="font-size:13px">
        Owner audit trail is stored in <code>data/owner_control/owner_audit.jsonl</code>.
        See ledger tab for financial records.
      </div>`;
  } catch(e) {
    document.getElementById('auditCard').innerHTML =
      `<div class="val-muted">Audit unavailable</div>`;
  }
}

// =====================================================================
// ALERTS
// =====================================================================
async function loadAlerts() {
  const listEl = document.getElementById('alertsList');
  listEl.innerHTML = '<div class="spinner"></div>';
  try {
    const res = await fetch(`${API_BASE}/api/owner/alerts?limit=30`);
    const data = await res.json();
    const alerts = (data.alerts || []).reverse();
    if (!alerts.length) {
      listEl.innerHTML = `<div class="val-muted" style="padding:16px;text-align:center;">No alerts yet.</div>`;
      return;
    }
    listEl.innerHTML = alerts.map(a => {
      const cls = a.event_type || 'default';
      return `<div class="alert-item alert-${cls}">
        <div class="alert-msg">${escHtml(a.message || '')}</div>
        <div class="alert-time">${timeAgo(a.timestamp)} &bull; ${(a.event_type||'').replace(/_/g,' ')}</div>
      </div>`;
    }).join('');
  } catch(e) {
    listEl.innerHTML = `<div style="color:var(--red);font-size:13px;padding:8px;">⚠️ ${e.message}</div>`;
  }
}

// =====================================================================
// LEDGER
// =====================================================================
async function loadLedger() {
  document.getElementById('ledgerBody').innerHTML =
    '<tr><td colspan="5" style="text-align:center;padding:20px;"><div class="spinner"></div></td></tr>';
  document.getElementById('reconBanner').innerHTML = '';

  try {
    const [ledgerRes, reconRes] = await Promise.all([
      fetch(`${API_BASE}/api/owner/ledger?limit=50`),
      fetch(`${API_BASE}/api/owner/reconcile`),
    ]);
    const ledgerData = await ledgerRes.json();
    const reconData  = await reconRes.json();

    // Reconciliation banner
    const recon = reconData.reconciliation || {};
    const reconEl = document.getElementById('reconBanner');
    if (recon.is_balanced !== undefined) {
      reconEl.innerHTML = `<div class="recon-banner ${recon.is_balanced ? 'ok' : 'err'}">
        ${recon.is_balanced ? '✅ Ledger Balanced' : '❌ Ledger Mismatch'}
        — ${recon.total_entries || 0} entries
        | balance ${fmt(recon.ledger_balance_usd)}
        ${!recon.is_balanced ? `<br><small>${(recon.errors||[]).join('; ')}</small>` : ''}
      </div>`;
    }

    // Ledger rows
    const entries = (ledgerData.entries || []).reverse();
    if (!entries.length) {
      document.getElementById('ledgerBody').innerHTML =
        '<tr><td colspan="5" style="text-align:center;padding:16px;color:var(--muted);">No entries yet.</td></tr>';
      return;
    }
    document.getElementById('ledgerBody').innerHTML = entries.map(e => {
      const typeShort = (e.event_type || '').replace(/_/g,' ');
      const inAmt  = e.credit_usd > 0 ? `<span class="amount-in">+${fmt(e.credit_usd)}</span>` : '—';
      const outAmt = e.debit_usd  > 0 ? `<span class="amount-out">−${fmt(e.debit_usd)}</span>` : '—';
      const bal    = `<span style="font-size:11px">${fmt(e.running_balance_usd)}</span>`;
      const desc   = escHtml((e.description || '').substring(0, 30));
      return `<tr>
        <td style="white-space:nowrap;font-size:11px">${escHtml(typeShort)}</td>
        <td>${inAmt}</td><td>${outAmt}</td><td>${bal}</td>
        <td style="color:var(--muted)">${desc}</td>
      </tr>`;
    }).join('');

  } catch(e) {
    document.getElementById('ledgerBody').innerHTML =
      `<tr><td colspan="5" style="color:var(--red);padding:12px;">⚠️ ${escHtml(e.message)}</td></tr>`;
  }
}

// =====================================================================
// OWNER CONTROL (PIN MODAL)
// =====================================================================
const ACTION_LABELS = {
  emergency_stop:       { title: '🚨 Emergency Stop',    desc: 'This will halt all new trade entries.' },
  clear_emergency_stop: { title: '✅ Clear Emergency Stop', desc: 'This will allow trading to resume.' },
  pause_trading:        { title: '⏸ Pause Trading',      desc: 'Pauses all new trade entries.' },
  resume_trading:       { title: '▶ Resume Trading',     desc: 'Resumes normal trading operations.' },
  disable_salary:       { title: '🔇 Disable Salary',    desc: 'Prevents weekly salary payouts.' },
  enable_salary:        { title: '💵 Enable Salary',     desc: 'Allows weekly salary payouts.' },
};

function doAction(action) {
  currentAction = action;
  const info = ACTION_LABELS[action] || { title: action, desc: '' };
  document.getElementById('modalTitle').textContent = info.title;
  document.getElementById('modalDesc').textContent  = info.desc;
  document.getElementById('pinInput').value = '';
  document.getElementById('pinModal').classList.add('open');
  setTimeout(() => document.getElementById('pinInput').focus(), 100);
}

function closeModal() {
  currentAction = null;
  document.getElementById('pinModal').classList.remove('open');
}

async function confirmAction() {
  if (!currentAction) return;
  const pin = document.getElementById('pinInput').value;
  const action = currentAction;
  closeModal();

  try {
    const res = await fetch(`${API_BASE}/api/owner/control`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, pin }),
    });
    const data = await res.json();
    if (data.success) {
      showToast('✅ ' + (data.message || 'Done'));
      loadStatus();
    } else {
      showToast('❌ ' + (data.message || 'Failed'), 3500);
    }
  } catch(e) {
    showToast('❌ Network error: ' + e.message, 3500);
  }
}

// Allow Enter key to confirm
document.getElementById('pinInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmAction();
  if (e.key === 'Escape') closeModal();
});

// =====================================================================
// XSS HELPER
// =====================================================================
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// =====================================================================
// AUTO-REFRESH
// =====================================================================
let _activeTab = 'status';
function autoRefresh() {
  const el = document.querySelector('.nav-btn.active');
  if (el) _activeTab = el.id.replace('nav-','');
  if (_activeTab === 'status')  loadStatus();
  if (_activeTab === 'alerts')  loadAlerts();
  if (_activeTab === 'ledger')  loadLedger();
}
setInterval(autoRefresh, REFRESH_MS);

// =====================================================================
// INITIAL LOAD
// =====================================================================
loadStatus();
</script>
