global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: nija-bot
    metrics_path: /metrics
    static_configs:
      - targets:
          - bot:5000

  - job_name: nija-dashboard-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - dashboard-api:9000

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
