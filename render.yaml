services:
  - type: web
    name: nija-trading-bot
    runtime: docker
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerCommand: bash scripts/production_bootstrap.sh
    autoDeployTrigger: checksPass
    numInstances: 1
    healthCheckPath: /healthz
    maxShutdownDelaySeconds: 60
    envVars:
      - key: PORT
        value: "5000"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: ALLOW_CONSUMER_USD
        value: "true"

      # Use the Render private-network connection string from the managed Key
      # Value service below. The web service and Key Value service are pinned to
      # the same region so the internal Redis URL remains routable.
      - key: NIJA_REDIS_URL
        fromService:
          type: keyvalue
          name: nija-redis
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: nija-redis
          property: connectionString
      # Existing Render services created outside this Blueprint may not receive
      # fromService variables. The bootstrap uses this private, credential-free
      # endpoint only when every standard Redis URL variable is absent.
      - key: NIJA_RENDER_REDIS_FALLBACK_URL
        value: "redis://red-d98dsl5aeets73fpb0hg:6379"
      - key: NIJA_REDIS_CONNECT_MAX_TOTAL_WAIT_S
        value: "12"
      - key: NIJA_REDIS_PERSISTENCE_REQUIRED
        value: "true"
      - key: NIJA_REQUIRE_DISTRIBUTED_LOCK
        value: "true"
      - key: STRICT_REDIS_WRITER_LOCK
        value: "true"
      - key: NIJA_STRICT_REDIS_LEASE
        value: "true"
      - key: NIJA_REDIS_RESET_POLICY
        value: "require_confirmation"

      # Production-safe small-account order floors. The bootstrap preserves any
      # stricter dashboard value and prevents internally inconsistent limits.
      - key: NIJA_MIN_CASH_RESERVE_USD
        value: "5.00"
      - key: MIN_TRADE_USD
        value: "3.50"
      - key: MIN_NOTIONAL_USD
        value: "3.50"
      - key: MIN_POSITION_USD
        value: "3.50"
      - key: MIN_CASH_TO_BUY
        value: "5.00"
      - key: MINIMUM_TRADING_BALANCE
        value: "5.00"

      # Multi-venue routing. Every connected venue is scanned independently and
      # sized only from its own spendable quote balance.
      - key: PRIMARY_EXECUTION_VENUE
        value: "auto"
      - key: NIJA_BROKER_PRIORITY
        value: "okx,coinbase,kraken"
      - key: NIJA_ENTRY_BROKER_PRIORITY
        value: "okx,coinbase,kraken"
      - key: NIJA_ALLOWED_EXECUTION_BROKERS
        value: "okx,coinbase,kraken"
      - key: NIJA_BROKER_INDEPENDENT_LIVE_EXECUTION
        value: "true"
      - key: NIJA_INDEPENDENT_BROKER_TRADING
        value: "true"
      - key: NIJA_BROKER_SCOPED_POSITION_CAP
        value: "true"

      # Strict production contract: no new live entries are admitted until both
      # Coinbase and OKX are connected, funded, market-ready, and activated.
      # Exit/reduce/liquidation orders remain allowed while a venue recovers.
      - key: NIJA_REQUIRE_SECONDARY_VENUES_READY
        value: "true"
      - key: NIJA_REQUIRED_LIVE_VENUES
        value: "coinbase,okx"
      - key: NIJA_SECONDARY_VENUE_STRICT_RECHECK_S
        value: "2"

      # Coinbase Advanced Trade activation. Consumer-wallet funds remain
      # inaccessible to the Advanced Trade API and are never counted here.
      - key: ENABLE_COINBASE
        value: "true"
      - key: ENABLE_COINBASE_TRADING
        value: "true"
      - key: COINBASE_LIVE_TRADING_ENABLED
        value: "true"
      - key: NIJA_DISABLE_COINBASE
        value: "false"
      - key: COINBASE_MIN_ORDER_USD
        value: "1.00"
      - key: COINBASE_VENUE_THRESHOLD_USD
        value: "12.00"

      # OKX live spot activation. The venue remains excluded until its own
      # credentials, connection, markets, and quote balance are verified.
      - key: ENABLE_OKX
        value: "true"
      - key: ENABLE_OKX_TRADING
        value: "true"
      - key: OKX_LIVE_TRADING_ENABLED
        value: "true"
      - key: NIJA_OKX_EXECUTION_ENABLED
        value: "true"
      - key: NIJA_OKX_LIVE_TRADING_ENABLED
        value: "true"
      - key: NIJA_DISABLE_OKX
        value: "false"
      - key: OKX_MIN_ORDER_USD
        value: "10.00"
      - key: OKX_BASE_URL
        value: "https://us.okx.com"
      - key: OKX_US_REGION
        value: "true"

      # Render cold-start convergence. Kraken remains the startup anchor, while
      # the strict entry gate waits for Coinbase and OKX before new exposure.
      - key: NIJA_RUNTIME_AUTHORITY_CONVERGENCE_MIN_BROKERS
        value: "1"
      - key: NIJA_RENDER_STARTUP_RECOVERY_ENABLED
        value: "true"
      - key: NIJA_RENDER_STARTUP_RECOVERY_INTERVAL_S
        value: "5"
      - key: NIJA_RENDER_STARTUP_RECOVERY_MAX_ATTEMPTS
        value: "60"
      - key: NIJA_CAPITAL_WATCHDOG_INTERVAL_S
        value: "5"
      - key: NIJA_CAPITAL_STARTUP_INVARIANT_TIMEOUT_S
        value: "90"
      - key: NIJA_WAIT_PLATFORM_TIMEOUT_S
        value: "90"
      - key: NIJA_POST_LOCK_CAPITAL_MONITOR_SECONDS
        value: "300"

      # Live-mode intent remains an operator-controlled Render secret/setting.
      # Runtime execution authority is deliberately absent: it is derived by the
      # current process only after writer-lock, heartbeat, and capital proof.
      - key: LIVE_TRADING
        sync: false
      - key: LIVE_CAPITAL_VERIFIED
        sync: false

      # Platform broker credentials. Values are entered in Render and never
      # committed to the repository.
      - key: KRAKEN_PLATFORM_API_KEY
        sync: false
      - key: KRAKEN_PLATFORM_API_SECRET
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: OKX_API_KEY
        sync: false
      - key: OKX_API_SECRET
        sync: false
      - key: OKX_PASSPHRASE
        sync: false

      # Independent user broker credentials
      - key: KRAKEN_USER_DAIVON_API_KEY
        sync: false
      - key: KRAKEN_USER_DAIVON_API_SECRET
        sync: false
      - key: KRAKEN_USER_TANIA_API_KEY
        sync: false
      - key: KRAKEN_USER_TANIA_API_SECRET
        sync: false

  # Durable private-only Redis-compatible datastore for writer fencing, nonce
  # state, heartbeats, and distributed runtime coordination.
  - type: keyvalue
    name: nija-redis
    region: oregon
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction
    persistenceMode: "journal-snapshot"
