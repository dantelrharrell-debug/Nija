name: Runtime repair regression tests

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "critical_runtime_repairs_v10.py"
      - "secondary_venue_runtime_diagnostics.py"
      - "bot/tests/test_critical_runtime_repairs_v10.py"
      - "bot/bot.py"
      - "bot/strategy_runtime_integrity_patch.py"
      - "bot/disconnected_coinbase_balance_guard_patch.py"
      - "bot/okx_patch_churn_guard_patch.py"
      - "bot/okx_order_wrapper_stability_patch.py"
      - "bot/downstream_risk_governor_equity_repair_patch.py"
      - "bot/live_active_dispatch_bridge_patch.py"
      - "bot/runtime_patch_churn_safety_patch.py"
      - "bot/generation_sync_timing_patch.py"
      - "bot/canonical_broker_main_entry_guard_v20.py"
      - "bot/stalled_writer_release_guard_v21.py"
      - "bot/canonical_broker_prebootstrap_v22.py"
      - "bot/stalled_writer_release_guard_v22.py"
      - "bot/tests/test_strategy_runtime_integrity_patch.py"
      - "bot/tests/test_disconnected_coinbase_balance_guard_patch.py"
      - "bot/tests/test_okx_patch_churn_guard_patch.py"
      - "bot/tests/test_okx_order_wrapper_stability_v2.py"
      - "bot/tests/test_live_active_dispatch_bridge_recovery.py"
      - "bot/tests/test_runtime_patch_churn_safety_patch.py"
      - "bot/tests/test_canonical_broker_main_entry_guard_v20.py"
      - "bot/tests/test_stalled_writer_release_guard_v21.py"
      - "bot/tests/test_canonical_broker_prebootstrap_v22.py"
      - "bot/tests/test_stalled_writer_release_guard_v22.py"
      - "bot/tests/test_secondary_venue_runtime_diagnostics.py"
      - "bot/tests/test_startup_handoff_all_fixes.py"
      - "bot/tests/test_runtime_entrypoint_attestation_v23.py"
      - "scripts/apply_startup_handoff_fix.py"
      - "scripts/runtime_entrypoint_attestation.py"
      - "scripts/install_sitecustomize_defer_guard.py"
      - ".github/workflows/runtime-repair-regression.yml"
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "critical_runtime_repairs_v10.py"
      - "secondary_venue_runtime_diagnostics.py"
      - "bot/tests/test_critical_runtime_repairs_v10.py"
      - "bot/bot.py"
      - "bot/strategy_runtime_integrity_patch.py"
      - "bot/disconnected_coinbase_balance_guard_patch.py"
      - "bot/okx_patch_churn_guard_patch.py"
      - "bot/okx_order_wrapper_stability_patch.py"
      - "bot/downstream_risk_governor_equity_repair_patch.py"
      - "bot/live_active_dispatch_bridge_patch.py"
      - "bot/runtime_patch_churn_safety_patch.py"
      - "bot/generation_sync_timing_patch.py"
      - "bot/canonical_broker_main_entry_guard_v20.py"
      - "bot/stalled_writer_release_guard_v21.py"
      - "bot/canonical_broker_prebootstrap_v22.py"
      - "bot/stalled_writer_release_guard_v22.py"
      - "bot/tests/test_strategy_runtime_integrity_patch.py"
      - "bot/tests/test_disconnected_coinbase_balance_guard_patch.py"
      - "bot/tests/test_okx_patch_churn_guard_patch.py"
      - "bot/tests/test_okx_order_wrapper_stability_v2.py"
      - "bot/tests/test_live_active_dispatch_bridge_recovery.py"
      - "bot/tests/test_runtime_patch_churn_safety_patch.py"
      - "bot/tests/test_canonical_broker_main_entry_guard_v20.py"
      - "bot/tests/test_stalled_writer_release_guard_v21.py"
      - "bot/tests/test_canonical_broker_prebootstrap_v22.py"
      - "bot/tests/test_stalled_writer_release_guard_v22.py"
      - "bot/tests/test_secondary_venue_runtime_diagnostics.py"
      - "bot/tests/test_startup_handoff_all_fixes.py"
      - "bot/tests/test_runtime_entrypoint_attestation_v23.py"
      - "scripts/apply_startup_handoff_fix.py"
      - "scripts/runtime_entrypoint_attestation.py"
      - "scripts/install_sitecustomize_defer_guard.py"
      - ".github/workflows/runtime-repair-regression.yml"

permissions:
  contents: read

jobs:
  focused-runtime-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONPATH: .
      NIJA_DEFER_RUNTIME_SITE_HOOKS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up production Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CI sitecustomize defer guard
        run: python -S scripts/install_sitecustomize_defer_guard.py

      - name: Install pytest
        run: env -u PYTHONPATH python -P -m pip install --disable-pip-version-check --retries 5 --timeout 30 pytest==8.2.2

      - name: Compile repaired runtime modules
        run: |
          python -m py_compile \
            critical_runtime_repairs_v10.py \
            secondary_venue_runtime_diagnostics.py \
            bot/strategy_runtime_integrity_patch.py \
            bot/disconnected_coinbase_balance_guard_patch.py \
            bot/okx_patch_churn_guard_patch.py \
            bot/okx_order_wrapper_stability_patch.py \
            bot/downstream_risk_governor_equity_repair_patch.py \
            bot/live_active_dispatch_bridge_patch.py \
            bot/runtime_patch_churn_safety_patch.py \
            bot/generation_sync_timing_patch.py \
            bot/canonical_broker_main_entry_guard_v20.py \
            bot/stalled_writer_release_guard_v21.py \
            bot/canonical_broker_prebootstrap_v22.py \
            bot/stalled_writer_release_guard_v22.py \
            scripts/apply_startup_handoff_fix.py \
            scripts/runtime_entrypoint_attestation.py \
            bot/bot.py

      - name: Run focused regression suite
        id: focused_tests
        continue-on-error: true
        run: |
          TEST_LOG="${RUNNER_TEMP}/nija-focused-runtime-tests.log"
          python -m pytest -q \
            bot/tests/test_critical_runtime_repairs_v10.py \
            bot/tests/test_strategy_runtime_integrity_patch.py \
            bot/tests/test_disconnected_coinbase_balance_guard_patch.py \
            bot/tests/test_okx_patch_churn_guard_patch.py \
            bot/tests/test_okx_order_wrapper_stability_v2.py \
            bot/tests/test_live_active_dispatch_bridge_recovery.py \
            bot/tests/test_runtime_patch_churn_safety_patch.py \
            bot/tests/test_canonical_broker_main_entry_guard_v20.py \
            bot/tests/test_stalled_writer_release_guard_v21.py \
            bot/tests/test_canonical_broker_prebootstrap_v22.py \
            bot/tests/test_stalled_writer_release_guard_v22.py \
            bot/tests/test_secondary_venue_runtime_diagnostics.py \
            bot/tests/test_startup_handoff_all_fixes.py \
            bot/tests/test_runtime_entrypoint_attestation_v23.py \
            >"${TEST_LOG}" 2>&1
          status=$?
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          if [ "${status}" -ne 0 ]; then
            echo "::group::Focused runtime test failure tail"
            tail -n 240 "${TEST_LOG}" || true
            echo "::endgroup::"
          else
            tail -n 40 "${TEST_LOG}" || true
          fi
          exit "${status}"

      - name: Upload focused test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: focused-runtime-test-diagnostics
          path: ${{ runner.temp }}/nija-focused-runtime-tests.log
          if-no-files-found: error
          retention-days: 7

      - name: Enforce focused test success
        if: always()
        run: |
          status="${{ steps.focused_tests.outputs.status }}"
          if [ -z "${status}" ]; then
            echo "Focused test status output is missing"
            exit 1
          fi
          exit "${status}"
