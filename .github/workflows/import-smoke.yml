name: CI — imports smoke test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  imports-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONPATH: .
      NIJA_DEFER_RUNTIME_SITE_HOOKS: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup production Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CI sitecustomize defer guard
        run: python -S scripts/install_sitecustomize_defer_guard.py

      - name: Install focused smoke dependencies
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if env -u PYTHONPATH python -P -m pip install --disable-pip-version-check --retries 5 --timeout 30 pytest==8.2.2 numpy==1.26.3; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              sleep $((attempt * 5))
            fi
          done
          exit 1

      - name: Apply production package defer guard
        run: python -S apply_bot_package_defer_fix.py

      - name: Run import smoke test
        run: python -m pytest -q tests/imports_smoke_test.py
