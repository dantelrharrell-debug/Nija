name: Branch policy

on:
  pull_request:
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce-branch-policy:
    runs-on: ubuntu-latest
    env:
      MAX_BRANCH_AGE_DAYS: "90"
      BRANCH_NAME_REGEX: "^(feature|fix|copilot|chore|docs|refactor|test|release|hotfix)\\/[a-z0-9._-]+$"
    steps:
      - name: Validate branch naming and age
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.payload.pull_request?.head?.ref;
            const maxAgeDays = Number(process.env.MAX_BRANCH_AGE_DAYS || "90");
            const regex = new RegExp(process.env.BRANCH_NAME_REGEX);

            if (!branch) {
              core.setFailed('Unable to detect PR head branch.');
              return;
            }

            if (!regex.test(branch)) {
              core.setFailed(
                `Branch "${branch}" is not allowed. Use one of: ` +
                `feature/*, fix/*, copilot/*, chore/*, docs/*, refactor/*, test/*, release/*, hotfix/*`
              );
              return;
            }

            const branchInfo = await github.rest.repos.getBranch({
              owner,
              repo,
              branch
            });

            const commitDateRaw =
              branchInfo.data?.commit?.commit?.author?.date ||
              branchInfo.data?.commit?.commit?.committer?.date;
            if (!commitDateRaw) {
              core.setFailed(`Unable to determine latest commit date for ${branch}.`);
              return;
            }

            const commitDate = new Date(commitDateRaw);
            const now = new Date();
            const ageDays = Math.floor((now - commitDate) / (1000 * 60 * 60 * 24));

            if (ageDays > maxAgeDays) {
              core.setFailed(
                `Branch "${branch}" is ${ageDays} days old (max ${maxAgeDays}). ` +
                `Rebase/refresh the branch or recreate it from current base.`
              );
              return;
            }

            core.info(`Branch "${branch}" passed policy checks (age: ${ageDays} days).`);
