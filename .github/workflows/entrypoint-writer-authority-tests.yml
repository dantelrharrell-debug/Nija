name: Entrypoint Writer Authority Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'bot/entrypoint_writer_authority.py'
      - 'bot/bot_main.py'
      - 'bot/tests/test_entrypoint_writer_authority.py'
      - 'bot/tests/test_entrypoint_writer_heartbeat.py'
      - '.github/workflows/entrypoint-writer-authority-tests.yml'
  push:
    branches: [main]
    paths:
      - 'bot/entrypoint_writer_authority.py'
      - 'bot/bot_main.py'
      - 'bot/tests/test_entrypoint_writer_authority.py'
      - 'bot/tests/test_entrypoint_writer_heartbeat.py'
      - '.github/workflows/entrypoint-writer-authority-tests.yml'

permissions:
  contents: read

jobs:
  writer-authority:
    name: writer-authority-ordering-and-ownership
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile authority entrypoint
        run: |
          python -m py_compile \
            bot/entrypoint_writer_authority.py \
            bot/bot_main.py \
            bot/tests/test_entrypoint_writer_authority.py \
            bot/tests/test_entrypoint_writer_heartbeat.py

      - name: Run focused writer authority tests
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          python -m unittest -v \
            bot.tests.test_entrypoint_writer_authority \
            bot.tests.test_entrypoint_writer_heartbeat
