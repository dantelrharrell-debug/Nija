name: NIJA Deployment Safety

on:
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'render.yaml'
      - 'scripts/production_bootstrap.sh'
      - 'render_liveness_server.py'
      - 'render_readiness_state_bridge.py'
      - 'prebot_writer_authority_bootstrap.py'
      - 'prebot_writer_authority_fail_closed.py'
      - 'source_runtime_guard_bootstrap.py'
      - 'secondary_venue_activation_patch.py'
      - 'secondary_venue_strict_readiness_patch.py'
      - 'bot/activation_pending_commit_monitor_patch.py'
      - 'bot/writer_lock_release_guard.py'
      - 'bot/entrypoint_writer_authority.py'
      - 'bot/bot_main.py'
      - 'bot/tests/test_activation_pending_startup_order.py'
      - 'bot/tests/test_writer_lock_release_guard.py'
      - 'bot/tests/test_entrypoint_writer_authority.py'
      - 'bot/tests/test_entrypoint_writer_heartbeat.py'
      - 'bot/tests/test_prebot_writer_authority_bootstrap.py'
      - 'bot/tests/test_render_prebot_writer_handoff.py'
      - 'bot/tests/test_render_liveness_launcher.py'
      - 'bot/tests/test_render_liveness_readiness.py'
      - 'bot/tests/test_source_runtime_guard_bootstrap.py'
      - 'bot/tests/test_docker_pth_startup_paths.py'
      - '.github/workflows/entrypoint-writer-authority-tests.yml'
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'render.yaml'
      - 'scripts/production_bootstrap.sh'
      - 'render_liveness_server.py'
      - 'render_readiness_state_bridge.py'
      - 'prebot_writer_authority_bootstrap.py'
      - 'prebot_writer_authority_fail_closed.py'
      - 'source_runtime_guard_bootstrap.py'
      - 'secondary_venue_activation_patch.py'
      - 'secondary_venue_strict_readiness_patch.py'
      - 'bot/activation_pending_commit_monitor_patch.py'
      - 'bot/writer_lock_release_guard.py'
      - 'bot/entrypoint_writer_authority.py'
      - 'bot/bot_main.py'
      - 'bot/tests/test_activation_pending_startup_order.py'
      - 'bot/tests/test_writer_lock_release_guard.py'
      - 'bot/tests/test_entrypoint_writer_authority.py'
      - 'bot/tests/test_entrypoint_writer_heartbeat.py'
      - 'bot/tests/test_prebot_writer_authority_bootstrap.py'
      - 'bot/tests/test_render_prebot_writer_handoff.py'
      - 'bot/tests/test_render_liveness_launcher.py'
      - 'bot/tests/test_render_liveness_readiness.py'
      - 'bot/tests/test_source_runtime_guard_bootstrap.py'
      - 'bot/tests/test_docker_pth_startup_paths.py'
      - '.github/workflows/entrypoint-writer-authority-tests.yml'

permissions:
  contents: read

jobs:
  deployment-safety:
    name: render-handoff-writer-and-readiness
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install focused test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest redis requests

      - name: Validate Render bootstrap contract
        run: |
          bash -n scripts/production_bootstrap.sh
          grep -Fq 'dockerCommand: bash scripts/production_bootstrap.sh' render.yaml
          grep -Fq 'healthCheckPath: /healthz' render.yaml
          grep -Fq 'PORT' render.yaml
          grep -Fq 'value: "5000"' render.yaml
          grep -Fq 'HEALTHCHECK' Dockerfile
          grep -Fq 'python -S -c' Dockerfile
          grep -Fq 'urllib.request' Dockerfile
          ! grep -A3 'HEALTHCHECK' Dockerfile | grep -Fq 'import requests'

      - name: Compile deployment entrypoints
        run: |
          python -m py_compile \
            render_liveness_server.py \
            render_readiness_state_bridge.py \
            prebot_writer_authority_bootstrap.py \
            prebot_writer_authority_fail_closed.py \
            source_runtime_guard_bootstrap.py \
            secondary_venue_activation_patch.py \
            secondary_venue_strict_readiness_patch.py \
            bot/activation_pending_commit_monitor_patch.py \
            bot/writer_lock_release_guard.py \
            bot/entrypoint_writer_authority.py \
            bot/bot_main.py

      - name: Run focused deployment safety tests
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          python -m pytest -q \
            bot/tests/test_activation_pending_startup_order.py \
            bot/tests/test_writer_lock_release_guard.py \
            bot/tests/test_entrypoint_writer_authority.py \
            bot/tests/test_entrypoint_writer_heartbeat.py \
            bot/tests/test_prebot_writer_authority_bootstrap.py \
            bot/tests/test_render_prebot_writer_handoff.py \
            bot/tests/test_render_liveness_launcher.py \
            bot/tests/test_render_liveness_readiness.py \
            bot/tests/test_source_runtime_guard_bootstrap.py \
            bot/tests/test_docker_pth_startup_paths.py
